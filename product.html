<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ürün Detay | MARLA TECH</title>

<style>

:root{
 --gold:#c9a14a;
 --soft:#f7f7f7;
}

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:Arial, Helvetica, sans-serif;
}

body{
 background:#fff;
 padding-top:90px;
}

/* HEADER */

header{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:80px;
 background:#fff;
 border-bottom:1px solid #eee;
 z-index:9999;
 display:flex;
 align-items:center;
}

.nav-inner{
 width:100%;
 display:flex;
 align-items:center;
 justify-content:space-between;
 padding:0 70px;
}

.header-logo{
 height:60px;
 cursor:pointer;
}

.menu{
 display:flex;
 align-items:center;
 gap:40px;
}

.menu-item{
 position:relative;
 font-size:14px;
 font-weight:500;
 cursor:pointer;
 display:flex;
 align-items:center;
 height:80px;
}

.menu-item:hover{
 color:var(--gold);
}

.search{
 border:1px solid #ddd;
 padding:8px 14px;
 border-radius:20px;
}

/* BREADCRUMB */

.breadcrumb{
 max-width:1200px;
 margin:30px auto;
 font-size:13px;
 color:#777;
}

/* PRODUCT */

.product-wrapper{
 max-width:1200px;
 margin:auto;
 display:flex;
 gap:60px;
}

.slider{
 position:relative;
}

.product-img{
 width:450px;
 border-radius:20px;
 transition:.4s;
}

.product-img:hover{
 transform:scale(1.05);
}

.slide-btn{
 position:absolute;
 top:50%;
 transform:translateY(-50%);
 background:rgba(0,0,0,.4);
 color:white;
 border:none;
 width:40px;
 height:40px;
 border-radius:50%;
 cursor:pointer;
 font-size:18px;
}

.prev{ left:10px }
.next{ right:10px }

.product-info{
 flex:1;
}

.product-info h1{
 margin-bottom:15px;
}

.product-desc{
 margin:20px 0;
 line-height:1.6;
 color:#444;
}

.more-btn{
 font-weight:bold;
 cursor:pointer;
 margin-top:5px;
 display:inline-block;
}

.more-text{
 display:none;
}

.btn{
 padding:14px 26px;
 border-radius:30px;
 border:none;
 cursor:pointer;
 font-weight:bold;
 margin-right:10px;
}

.offer{
 background:var(--gold);
 color:white;
}

.whatsapp{
 background:#25d366;
 color:white;
}

/* FEATURES */

.features{
 max-width:1200px;
 margin:60px auto;
}

.features h2{
 margin-bottom:15px;
}

.features ul{
 padding-left:20px;
}

.features li{
 margin-bottom:8px;
}

/* SPECS */

.specs{
 max-width:1200px;
 margin:40px auto;
}

.specs table{
 width:100%;
 border-collapse:collapse;
}

.specs td{
 border-bottom:1px solid #eee;
 padding:10px;
}

.specs td:first-child{
 font-weight:bold;
 width:200px;
}

/* sticky */

.sticky-buttons{
 position:fixed;
 right:20px;
 bottom:20px;
 display:flex;
 flex-direction:column;
 gap:10px;
}

.sticky-buttons a{
 width:50px;
 height:50px;
 background:var(--gold);
 border-radius:50%;
 display:flex;
 align-items:center;
 justify-content:center;
 color:white;
 text-decoration:none;
 font-size:20px;
}

</style>
</head>

<body>

<header>
 <div class="nav-inner">

   <a href="index.html">
     <img src="header-logo.png" class="header-logo">
   </a>

   <div class="menu">
     <div class="menu-item">Kategoriler</div>
     <div class="menu-item">NEW</div>
     <div class="menu-item">Ürün Ara</div>
     <div class="menu-item">Hakkımızda</div>
   </div>

   <input class="search" placeholder="Ürün ara..."/>

 </div>
</header>

<div class="breadcrumb">
 Ana Sayfa / Ürünler / Ürün Detay
</div>

<div class="product-wrapper">

<div class="slider">

<button class="slide-btn prev" onclick="prevImg()">‹</button>

<img id="product-img" class="product-img">

<button class="slide-btn next" onclick="nextImg()">›</button>

</div>

<div class="product-info">

<h1 id="product-name"></h1>

<p class="product-desc">
<span id="product-desc"></span>
<span class="more-text" id="more-text"></span>
<span class="more-btn" onclick="toggleMore()">Daha fazla...</span>
</p>

<button class="btn offer">Teklif Al</button>
<button class="btn whatsapp">WhatsApp</button>

</div>

</div>

<div class="features">

<h2>Özellikler</h2>
<ul id="feature-list"></ul>

</div>

<div class="specs">

<h2>Teknik Özellikler</h2>

<table id="spec-table"></table>

</div>

<div class="sticky-buttons">
<a href="#">↑</a>
<a href="#">☎</a>
</div>

<script>

let products=[]
let currentImages=[]
let currentIndex=0

function toggleMore(){
 const text=document.querySelector('.more-text')
 const btn=document.querySelector('.more-btn')

 if(text.style.display==="inline"){
  text.style.display="none"
  btn.innerText="Daha fazla..."
 }else{
  text.style.display="inline"
  btn.innerText="Daha az"
 }
}

function showImg(){
 document.getElementById("product-img").src=currentImages[currentIndex]
}

function nextImg(){
 currentIndex++
 if(currentIndex>=currentImages.length) currentIndex=0
 showImg()
}

function prevImg(){
 currentIndex--
 if(currentIndex<0) currentIndex=currentImages.length-1
 showImg()
}

fetch("product.json")
.then(r=>r.json())
.then(data=>{

products=data

const params=new URLSearchParams(window.location.search)
const id=parseInt(params.get("id"))

const p=products.find(x=>x.id===id)

if(!p)return

currentImages=p.images
showImg()

document.getElementById("product-name").innerText=p.name

const desc=p.desc.split(". ")

document.getElementById("product-desc").innerText=desc[0]+". "
document.getElementById("more-text").innerText=desc.slice(1).join(". ")


// FEATURES

const featureList=document.getElementById("feature-list")

p.features.forEach(f=>{
 const li=document.createElement("li")
 li.innerText=f
 featureList.appendChild(li)
})


// SPECS

const specTable=document.getElementById("spec-table")

for(let key in p.specs){

 const row=document.createElement("tr")

 const td1=document.createElement("td")
 td1.innerText=key

 const td2=document.createElement("td")
 td2.innerText=p.specs[key]

 row.appendChild(td1)
 row.appendChild(td2)

 specTable.appendChild(row)

}

})

</script>

</body>
</html>
