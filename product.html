<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ürün Detayı | MARLA TECH</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.14.0/gsap.min.js"></script>

<style>
:root{
 --gold:#d4af37;
 --soft:#f6f6f6;
 --gray:#666;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:#fff;color:#111}

/* ================= HEADER (INDEX İLE AYNI) ================= */

header{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:80px;
 background:#fff;
 display:flex;
 align-items:center;
 justify-content:space-between;
 padding:0 70px;
 box-shadow:0 2px 14px rgba(0,0,0,.05);
 z-index:9999;
}

.header-logo{
 height:46px;
 cursor:pointer;
}

nav{
 display:flex;
 align-items:center;
 gap:30px;
 font-size:14px;
}

.nav-item{
 cursor:pointer;
 font-weight:500;
}

.nav-item:hover{color:var(--gold)}

/* SEARCH */
.search{
 padding:9px 16px;
 border-radius:30px;
 border:1px solid #ddd;
 outline:none;
 transition:.3s;
}
.search:focus{
 border-color:var(--gold);
 box-shadow:0 0 0 3px rgba(212,175,55,.15);
}

/* DROPDOWN FIX */
.dropdown{
 position:relative;
 padding-bottom:16px;
}
.dropdown-menu{
 position:absolute;
 top:100%;
 left:0;
 background:#fff;
 border-radius:14px;
 box-shadow:0 10px 30px rgba(0,0,0,.15);
 min-width:220px;
 padding:8px 0;
 display:none;
}
.dropdown:hover .dropdown-menu{
 display:block;
}
.dropdown-menu div{
 padding:10px 16px;
 cursor:pointer;
}
.dropdown-menu div:hover{
 background:var(--soft);
 color:var(--gold);
}

/* ================= PAGE ================= */

main{
 padding-top:110px;
 padding-bottom:80px;
}

/* breadcrumb */
.breadcrumb{
 max-width:1100px;
 margin:0 auto 30px;
 color:#888;
 font-size:13px;
}

/* ================= PRODUCT ================= */

.product-container{
 display:flex;
 gap:60px;
 max-width:1100px;
 margin:auto;
 flex-wrap:wrap;
}

.product-left{
 flex:1;
 min-width:300px;
 position:relative;
}

.product-left img{
 width:100%;
 border-radius:14px;
}

.slider-arrow{
 position:absolute;
 top:50%;
 transform:translateY(-50%);
 background:rgba(255,255,255,.85);
 width:30px;
 height:30px;
 border-radius:50%;
 display:flex;
 align-items:center;
 justify-content:center;
 cursor:pointer;
 font-size:14px;
 box-shadow:0 4px 14px rgba(0,0,0,.15);
}
.left-arrow{left:10px}
.right-arrow{right:10px}

.product-right{
 flex:1;
 min-width:300px;
 display:flex;
 flex-direction:column;
 gap:20px;
}

.product-right h1{
 color:var(--gold);
 font-size:30px;
}

/* description with expand */
.desc-wrapper{
 position:relative;
}

#product-desc{
 max-height:120px;
 overflow:hidden;
 line-height:1.7;
 color:#555;
 transition:.4s;
}

#product-desc.expanded{
 max-height:1000px;
}

.read-more{
 margin-top:8px;
 font-weight:600;
 cursor:pointer;
 color:var(--gold);
}

/* sticky buttons */
.sticky-btns{
 margin-top:auto;
 display:flex;
 gap:15px;
 position:sticky;
 bottom:10px;
 background:#fff;
 padding-top:10px;
}

.btn{
 padding:12px 20px;
 border-radius:10px;
 font-weight:600;
 text-decoration:none;
 text-align:center;
}

.gold{
 background:var(--gold);
 color:#fff;
}

.green{
 background:#25D366;
 color:#fff;
}

.btn:hover{
 transform:translateY(-2px);
}

@media(max-width:768px){
 .product-container{flex-direction:column}
}
</style>
</head>

<body>

<header>

<a href="index.html">
 <img src="header-logo.png" class="header-logo">
</a>

<nav>

<div class="dropdown nav-item">
Kategoriler
<div class="dropdown-menu" id="dropdown"></div>
</div>

<div class="nav-item" onclick="showNew()">NEW</div>

<input class="search" id="search" placeholder="Ürün ara">

<a class="nav-item" href="index.html#about">Hakkımızda</a>

</nav>
</header>


<main>

<div class="breadcrumb">
Ana Sayfa > Ürün Detayı
</div>


<div class="product-container">

 <div class="product-left">
   <img id="product-img">
   <div class="slider-arrow left-arrow" id="prev">‹</div>
   <div class="slider-arrow right-arrow" id="next">›</div>
 </div>

 <div class="product-right">

   <h1 id="product-name"></h1>

   <div class="desc-wrapper">
     <p id="product-desc"></p>
     <div class="read-more" id="read-more">Daha Fazla...</div>
   </div>

   <div class="sticky-btns">
     <a id="offerBtn" class="btn gold" target="_blank">Teklif Al</a>
     <a id="whatsappBtn" class="btn green" target="_blank">WhatsApp İletişim</a>
   </div>

 </div>

</div>

</main>


<script>

/* ===== PRODUCTS LOAD ===== */
let products=[];

fetch('product.json')
.then(r=>r.json())
.then(d=>{
 products=d;
 populateCategories();
 initProduct();
});

/* dropdown */
function populateCategories(){
 const drop=document.getElementById("dropdown");
 [...new Set(products.map(p=>p.cat))].forEach(cat=>{
   drop.innerHTML+=`<div onclick="location='index.html'">${cat}</div>`;
 });
}

/* init product */
function initProduct(){

 const params=new URLSearchParams(window.location.search);
 const id=parseInt(params.get("id"));
 const p=products.find(x=>x.id===id);

 if(!p) return;

 let index=0;

 const img=document.getElementById("product-img");
 img.src=p.images[0];

 document.getElementById("product-name").innerText=p.name;
 document.getElementById("product-desc").innerText=p.desc;

 const link="https://wa.me/905000000000?text="+encodeURIComponent(p.name+" için teklif almak istiyorum");
 offerBtn.href=link;
 whatsappBtn.href=link;

 prev.onclick=()=>{index=(index-1+p.images.length)%p.images.length;img.src=p.images[index];}
 next.onclick=()=>{index=(index+1)%p.images.length;img.src=p.images[index];}

 /* read more */
 let expanded=false;
 read-more.onclick=()=>{}
}

/* read more fix */
const desc=document.getElementById("product-desc");
const readBtn=document.getElementById("read-more");
let open=false;
readBtn.onclick=()=>{
 open=!open;
 desc.classList.toggle("expanded");
 readBtn.innerText=open?"Daha Az Göster":"Daha Fazla...";
};

/* anim */
gsap.from(".product-left",{x:-80,opacity:0,duration:1});
gsap.from(".product-right",{x:80,opacity:0,duration:1,delay:.2});

</script>

</body>
</html>
