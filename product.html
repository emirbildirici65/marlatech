<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ürün Detay</title>

<style>
body{
font-family:Poppins, sans-serif;
background:#fff;
padding:100px 60px;
}

/* breadcrumb */
.breadcrumb{
margin-bottom:20px;
color:#777;
font-size:14px;
}

/* layout */
.detail{
display:grid;
grid-template-columns:1fr 1fr;
gap:60px;
max-width:1100px;
margin:auto;
}

/* zoom hover */
.image-wrap{
overflow:hidden;
border-radius:12px;
}

.image-wrap img{
width:100%;
transition:.4s;
}

.image-wrap:hover img{
transform:scale(1.2);
}

/* sticky buttons */
.buttons{
position:sticky;
top:120px;
display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;
}

.btn{
padding:14px;
text-align:center;
background:#c7a14a;
color:#fff;
text-decoration:none;
border-radius:8px;
font-weight:600;
}
</style>
</head>
<body>

<div class="breadcrumb">
Ana Sayfa > Ürün > Detay
</div>

<div class="detail">
<div class="image-wrap">
<img id="img">
</div>

<div>
<h2 id="name"></h2>
<p id="desc"></p>
<h3 id="price"></h3>

<div class="buttons">
<a href="https://wa.me/905555555555" class="btn">WhatsApp</a>
<a href="#" class="btn">Satın Al</a>
</div>
</div>
</div>

<script>
const id=new URLSearchParams(location.search).get('id');

fetch('product.json')
.then(r=>r.json())
.then(data=>{
const p=data.find(x=>x.id==id);

img.src=p.image;
name.innerText=p.name;
desc.innerText=p.description;
price.innerText=p.price+" ₺";
});
</script>

</body>
</html>
