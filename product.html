<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ürün</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins;padding:120px 60px}

/* header aynı */
header{position:fixed;top:0;width:100%;background:#fff;padding:18px 60px;box-shadow:0 2px 12px rgba(0,0,0,.05)}
header img{height:42px}

.detail{display:grid;grid-template-columns:1fr 1fr;gap:60px;max-width:1100px;margin:auto}

.image-wrap{overflow:hidden;border-radius:12px}
.image-wrap img{width:100%;transition:.4s}
.image-wrap:hover img{transform:scale(1.2)}

.buttons{position:sticky;top:120px;display:flex;flex-direction:column;gap:10px}

.btn{padding:14px;text-align:center;border-radius:8px;text-decoration:none;font-weight:600}
.whatsapp{background:#25d366;color:#fff}
.offer{background:#c7a14a;color:#fff}

.more{font-weight:700;cursor:pointer;margin-top:10px}
.hidden{display:none}
</style>
</head>

<body>

<header>
<a href="index.html"><img src="logo.png"></a>
</header>

<div class="detail">
<div class="image-wrap">
<img id="img">
</div>

<div>
<h2 id="name"></h2>
<p id="descShort"></p>
<div id="descFull" class="hidden"></div>
<div class="more" onclick="toggle()">Daha fazla...</div>

<div class="buttons">
<a class="btn whatsapp">WhatsApp</a>
<a class="btn offer">Teklif Al</a>
</div>
</div>
</div>

<script>
const id=new URLSearchParams(location.search).get('id');

fetch('product.json')
.then(r=>r.json())
.then(d=>{
const p=d.find(x=>x.id==id);

img.src=p.image;
name.innerText=p.name;

let txt=p.description;
descShort.innerText=txt.slice(0,120);
descFull.innerText=txt.slice(120);
});

function toggle(){
descFull.classList.toggle('hidden');
}
</script>

</body>
</html>
