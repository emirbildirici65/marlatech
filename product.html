<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ürün Detay | MARLA TECH</title>

<style>

:root{
 --gold:#c9a14a;
 --soft:#f7f7f7;
}

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:Arial, Helvetica, sans-serif;
}

body{
 background:#fff;
 padding-top:90px;
}

/* HEADER */

header{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:80px;
 background:#fff;
 border-bottom:1px solid #eee;
 z-index:9999;
 display:flex;
 align-items:center;
}

.nav-inner{
 width:100%;
 display:flex;
 align-items:center;
 justify-content:space-between;
 padding:0 70px;
}

.header-logo{
 height:60px;
 cursor:pointer;
}

.menu{
 display:flex;
 align-items:center;
 gap:40px;
}

.menu-item{
 position:relative;
 font-size:14px;
 font-weight:500;
 cursor:pointer;
 display:flex;
 align-items:center;
 height:80px;
}

.menu-item:hover{
 color:var(--gold);
}

/* dropdown */

.dropdown{
 position:absolute;
 top:80px;
 left:0;
 width:240px;
 background:white;
 border-radius:14px;
 box-shadow:0 10px 30px rgba(0,0,0,.15);
 max-height:240px;
 overflow-y:auto;
 display:none;
}

.menu-item:hover .dropdown,
.dropdown:hover{
 display:block;
}

.dropdown div{
 padding:10px 16px;
 font-size:13px;
 cursor:pointer;
}

.dropdown div:hover{
 background:var(--soft);
 color:var(--gold);
}

.search{
 border:1px solid #ddd;
 padding:8px 14px;
 border-radius:20px;
}

/* BREADCRUMB */

.breadcrumb{
 max-width:1200px;
 margin:30px auto;
 font-size:13px;
 color:#777;
}

/* PRODUCT */

.product-wrapper{
 max-width:1200px;
 margin:auto;
 display:flex;
 gap:60px;
}

.product-img{
 width:450px;
 border-radius:20px;
 transition:.4s;
}

.product-img:hover{
 transform:scale(1.05);
}

.product-info{
 flex:1;
}

.product-info h1{
 margin-bottom:15px;
}

.product-desc{
 margin:20px 0;
 line-height:1.6;
 color:#444;
}

.more-btn{
 font-weight:bold;
 cursor:pointer;
 margin-top:5px;
 display:inline-block;
}

.more-text{
 display:none;
}

.btn{
 padding:14px 26px;
 border-radius:30px;
 border:none;
 cursor:pointer;
 font-weight:bold;
 margin-right:10px;
}

.offer{
 background:var(--gold);
 color:white;
}

.whatsapp{
 background:#25d366;
 color:white;
}

.sticky-buttons{
 position:fixed;
 right:20px;
 bottom:20px;
 display:flex;
 flex-direction:column;
 gap:10px;
}

.sticky-buttons a{
 width:50px;
 height:50px;
 background:var(--gold);
 border-radius:50%;
 display:flex;
 align-items:center;
 justify-content:center;
 color:white;
 text-decoration:none;
 font-size:20px;
}

</style>
</head>

<body>

<header>
 <div class="nav-inner">

   <a href="index.html">
     <img src="header-logo.png" class="header-logo">
   </a>

   <div class="menu">
     <div class="menu-item">Kategoriler</div>
     <div class="menu-item">NEW</div>
     <div class="menu-item">Ürün Ara</div>
     <div class="menu-item">Hakkımızda</div>
   </div>

   <input class="search" placeholder="Ürün ara..."/>

 </div>
</header>

<div class="breadcrumb">
 Ana Sayfa / Ürünler / Ürün Detay
</div>

<div class="product-wrapper">

 <img id="product-img" class="product-img">

 <div class="product-info">

   <h1 id="product-name"></h1>

   <p class="product-desc">
     <span id="product-desc"></span>
     <span class="more-text" id="more-text"></span>
     <span class="more-btn" onclick="toggleMore()">Daha fazla...</span>
   </p>

   <button class="btn offer">Teklif Al</button>
   <button class="btn whatsapp">WhatsApp</button>

 </div>

</div>

<div class="sticky-buttons">
 <a href="#">↑</a>
 <a href="#">☎</a>
</div>

<script>

function toggleMore(){
 const text=document.querySelector('.more-text')
 const btn=document.querySelector('.more-btn')

 if(text.style.display==="inline"){
  text.style.display="none"
  btn.innerText="Daha fazla..."
 }else{
  text.style.display="inline"
  btn.innerText="Daha az"
 }
}

/* JSON'DAN ÜRÜN ÇEKME */

let products=[]

fetch("product.json")
.then(r=>r.json())
.then(data=>{

products=data

const params=new URLSearchParams(window.location.search)
const id=parseInt(params.get("id"))

const p=products.find(x=>x.id===id)

if(!p)return

document.getElementById("product-img").src=p.images[0]
document.getElementById("product-name").innerText=p.name

const desc=p.desc.split(". ")

document.getElementById("product-desc").innerText=desc[0]+". "
document.getElementById("more-text").innerText=desc.slice(1).join(". ")

})

</script>

</body>
</html>
