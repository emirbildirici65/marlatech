<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARLA TECH</title>

<style>

:root{
--gold:#c9a14a;
--soft:#f6f6f6;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#fff;
padding-top:90px;
}

/* HEADER */

header{
position:fixed;
top:0;
left:0;
width:100%;
height:80px;
background:#fff;
border-bottom:1px solid #eee;
display:flex;
align-items:center;
z-index:9999;
}

.nav-inner{
width:100%;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 70px;
}

.header-logo{
height:66px;
cursor:pointer;
}

.menu{
display:flex;
align-items:center;
gap:40px;
height:80px;
}

.menu-item{
position:relative;
display:flex;
align-items:center;
height:80px;
cursor:pointer;
font-size:14px;
font-weight:500;
}

.menu-item:hover{
color:var(--gold);
}

/* dropdown */

.dropdown{
position:absolute;
top:80px;
left:0;
width:240px;
background:white;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
max-height:240px;
overflow-y:auto;
display:none;
padding:6px 0;
}

.menu-item:hover .dropdown,
.dropdown:hover{
display:block;
}

.dropdown div{
padding:10px 16px;
cursor:pointer;
}

.dropdown div:hover{
background:var(--soft);
color:var(--gold);
}

.dropdown::-webkit-scrollbar{
width:6px;
}

.dropdown::-webkit-scrollbar-thumb{
background:#ccc;
border-radius:10px;
}

.search{
border:1px solid #ddd;
padding:8px 14px;
border-radius:20px;
}

/* HERO */

.hero{
height:520px;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:1s;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.slide.active{
opacity:1;
}

/* PRODUCTS */

.products{
max-width:1200px;
margin:70px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.card{
background:#fff;
border-radius:20px;
padding:18px;
position:relative;
border:1px solid #eee;
transition:.3s;
cursor:pointer;
}

.card:hover{
transform:scale(1.04);
box-shadow:0 0 0 2px var(--gold),0 20px 40px rgba(0,0,0,.12);
}

.card img{
width:100%;
border-radius:12px;
}

.card h3{
margin-top:10px;
font-size:15px;
}

.badge{
position:absolute;
top:12px;
left:12px;
background:var(--gold);
color:#fff;
padding:5px 10px;
font-size:11px;
border-radius:20px;
}

/* CONTACT */

.contact{
background:#fafafa;
padding:90px 70px;
}

.contact-box{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:50px;
}

.contact-card{
background:#fff;
padding:40px;
border-radius:18px;
box-shadow:0 10px 40px rgba(0,0,0,.07);
}

.contact input,
.contact textarea{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:10px;
border:1px solid #ddd;
outline:none;
}

.contact button{
background:var(--gold);
color:#fff;
border:none;
padding:12px;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

/* ABOUT */

.about{
padding:100px 20px;
text-align:center;
}

.about img{
height:280px;
margin:35px 0;
}

/* FOOTER */

footer{
background:#111;
color:#fff;
text-align:center;
padding:30px;
}

</style>
</head>

<body>

<header>

<div class="nav-inner">

<a href="index.html">
<img src="header-logo.png" class="header-logo">
</a>

<div class="menu">

<div class="menu-item">
KATEGORİ
<div class="dropdown" id="dropdown"></div>
</div>

<div class="menu-item" onclick="showNew()">NEW</div>

<div class="menu-item">
<input class="search" id="search" placeholder="Ürün ara">
</div>

<a class="menu-item" href="#about">Hakkımızda</a>

</div>

</div>

</header>


<section class="hero">

<div class="slide active">
<img src="https://picsum.photos/1600/900?1">
</div>

<div class="slide">
<img src="https://picsum.photos/1600/900?2">
</div>

</section>


<section id="products" class="products"></section>


<section class="contact">

<div class="contact-box">

<div class="contact-card">
<h2>İletişim</h2>
<p>📍 İstanbul / Türkiye</p>
<p>📞 +90 5XX XXX XX XX</p>
<p>✉ info@marlatech.com</p>
</div>

<div class="contact-card">
<form>
<input placeholder="Ad Soyad">
<input placeholder="Email">
<textarea rows="5" placeholder="Mesaj"></textarea>
<button>Gönder</button>
</form>
</div>

</div>

</section>


<section id="about" class="about">

<h2>Hakkımızda</h2>

<img src="logo.png">

<p>
MARLA TECH global elektronik ithalat ve toptan satış çözümleri sunar.
Premium kalite, güvenilir tedarik ve modern teknoloji odaklıdır.
</p>

</section>

<footer>
© 2026 MARLA TECH
</footer>


<script>

let products=[]

fetch("product.json")
.then(r=>r.json())
.then(data=>{

products=data

const grid=document.getElementById("products")
const dropdown=document.getElementById("dropdown")

const cats=[...new Set(products.map(p=>p.cat))]

cats.forEach(cat=>{
dropdown.innerHTML+=`<div onclick="filter('${cat}')">${cat}</div>`
})

render(products)

})

function render(list){

const grid=document.getElementById("products")

grid.innerHTML=""

list.forEach((p,i)=>{

grid.innerHTML+=`

<div class="card" onclick="location='product.html?id=${p.id}'">

${i<2?'<div class="badge">NEW</div>':''}

<img src="${p.images[0]}">

<h3>${p.name}</h3>

</div>

`

})

}

function filter(cat){
render(products.filter(p=>p.cat===cat))
}

search.oninput=e=>{
render(products.filter(p=>p.name.toLowerCase().includes(e.target.value.toLowerCase())))
}

function showNew(){
render(products.slice(-3))
}

let slides=document.querySelectorAll(".slide")
let i=0

setInterval(()=>{
slides[i].classList.remove("active")
i=(i+1)%slides.length
slides[i].classList.add("active")
},4000)

</script>

</body>
</html>
