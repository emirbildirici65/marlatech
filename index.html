<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MARLA TECH</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>

<style>
:root{
--gold:#c7a14a;
--dark:#111;
--light:#fff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#fff;
color:#111;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
background:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:18px 60px;
box-shadow:0 2px 12px rgba(0,0,0,.05);
z-index:999;
}

.logo{
font-size:22px;
font-weight:700;
color:var(--dark);
text-decoration:none;
}

nav{
display:flex;
gap:28px;
align-items:center;
}

nav a{
text-decoration:none;
color:#222;
font-weight:500;
}

/* SEARCH */
.search{
padding:8px 14px;
border-radius:25px;
border:1px solid #ddd;
outline:none;
}

/* HERO */
.hero{
margin-top:90px;
height:520px;
overflow:hidden;
position:relative;
}

.slide{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
opacity:0;
transform:scale(1.08);
transition:all 1.2s ease;
}

.slide.active{
opacity:1;
transform:scale(1);
}

/* PRODUCTS */
.products{
padding:80px 60px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:30px;
}

.card{
background:#fff;
border-radius:14px;
padding:20px;
box-shadow:0 6px 20px rgba(0,0,0,.05);
transition:.3s;
cursor:pointer;
position:relative;
overflow:hidden;
}

.card:hover{
box-shadow:0 0 0 2px var(--gold);
transform:translateY(-4px);
}

/* NEW badge */
.badge{
position:absolute;
top:12px;
left:12px;
background:var(--gold);
color:#fff;
font-size:11px;
padding:4px 10px;
border-radius:20px;
font-weight:600;
}

/* image zoom */
.card img{
width:100%;
height:200px;
object-fit:contain;
transition:.4s;
}

.card:hover img{
transform:scale(1.1);
}

.title{
margin-top:12px;
font-weight:600;
}

.price{
color:var(--gold);
margin-top:6px;
}

/* FOOTER */
footer{
background:#111;
color:#fff;
padding:60px;
text-align:center;
margin-top:60px;
}
</style>
</head>
<body>

<header>
<a href="index.html" class="logo">MARLA TECH</a>

<nav>
<input class="search" id="search" placeholder="Ürün ara..." />
<a href="#about">Hakkımızda</a>
</nav>
</header>

<section class="hero">
<div class="slide active" style="background-image:url('https://picsum.photos/1600/900?1')"></div>
<div class="slide" style="background-image:url('https://picsum.photos/1600/900?2')"></div>
<div class="slide" style="background-image:url('https://picsum.photos/1600/900?3')"></div>
</section>

<section class="products" id="products"></section>

<footer id="about">
<h2>Hakkımızda</h2>
<p>Premium elektronik ithalat ve toptan satış çözümleri sunar.</p>
</footer>

<script>
/* SLIDER */
const slides=document.querySelectorAll('.slide');
let i=0;
setInterval(()=>{
slides[i].classList.remove('active');
i=(i+1)%slides.length;
slides[i].classList.add('active');
},3500);

/* PRODUCTS */
fetch('product.json')
.then(r=>r.json())
.then(data=>{
const wrap=document.getElementById('products');

data.forEach((p,index)=>{
const card=document.createElement('div');
card.className='card';

card.innerHTML=`
${index<3?'<div class="badge">NEW</div>':''}
<img src="${p.image}">
<div class="title">${p.name}</div>
<div class="price">${p.price} ₺</div>
`;

card.onclick=()=>location.href=`product.html?id=${p.id}`;

wrap.appendChild(card);
});

/* SEARCH */
document.getElementById('search').addEventListener('input',e=>{
const val=e.target.value.toLowerCase();
document.querySelectorAll('.card').forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(val)?'block':'none';
});
});
});
</script>

</body>
</html>
