<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MARLA TECH</title>

<style>

:root{
 --gold:#c9a14a;
 --soft:#f7f7f7;
}

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:Arial, Helvetica, sans-serif;
}

body{
 background:#fff;
 padding-top:90px;
}


/* ================= HEADER ================= */

header{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:80px;
 background:#fff;
 border-bottom:1px solid #eee;
 z-index:9999;
 display:flex;
 align-items:center;
}

.nav-inner{
 width:100%;
 display:flex;
 align-items:center;
 justify-content:space-between;
 padding:0 70px;
}

.header-logo{
 height:66px;
 cursor:pointer;
}


/* ================= MENU ================= */

.menu{
 display:flex;
 align-items:center;
 gap:40px;
 height:80px;
}

.menu-item{
 position:relative;
 font-size:14px;
 font-weight:500;
 cursor:pointer;
 display:flex;
 align-items:center;
 height:80px;
}

.menu-item:hover{
 color:var(--gold);
}


/* dropdown (gap fix + scroll) */

.dropdown{
 position:absolute;
 top:80px;
 left:0;
 width:240px;
 background:white;
 border-radius:14px;
 box-shadow:0 10px 30px rgba(0,0,0,.15);
 max-height:240px;
 overflow-y:auto;
 display:none;
 padding:6px 0;
}

.menu-item:hover .dropdown,
.dropdown:hover{
 display:block;
}

.dropdown div{
 padding:10px 16px;
 font-size:13px;
 cursor:pointer;
}

.dropdown div:hover{
 background:var(--soft);
 color:var(--gold);
}

.dropdown::-webkit-scrollbar{
 width:6px;
}
.dropdown::-webkit-scrollbar-thumb{
 background:rgba(0,0,0,.25);
 border-radius:10px;
}


/* ================= SEARCH ================= */

.search{
 border:1px solid #ddd;
 padding:8px 14px;
 border-radius:20px;
}


/* ================= HERO SLIDER ================= */

.hero{
 width:100%;
 height:520px;
 overflow:hidden;
 position:relative;
}

.slide{
 position:absolute;
 width:100%;
 height:100%;
 opacity:0;
 transform:scale(1.05);
 transition:opacity 1.2s ease, transform 6s ease;
}

.slide img{
 width:100%;
 height:100%;
 object-fit:cover;
}

.slide.active{
 opacity:1;
 transform:scale(1);
}


/* ================= PRODUCTS ================= */

.products{
 max-width:1200px;
 margin:70px auto;
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:30px;
}

.card{
 background:white;
 border-radius:20px;
 padding:18px;
 position:relative;
 transition:.35s;
 border:1px solid #eee;
}

.card:hover{
 transform:scale(1.05);
 box-shadow:0 0 0 2px var(--gold), 0 20px 40px rgba(0,0,0,.12);
}

.card img{
 width:100%;
 border-radius:14px;
}

.card h3{
 margin-top:12px;
 font-size:14px;
}

.card span{
 font-size:13px;
 color:#777;
}


/* NEW label */

.badge{
 position:absolute;
 top:12px;
 left:12px;
 background:var(--gold);
 color:white;
 padding:5px 10px;
 font-size:11px;
 border-radius:20px;
}


/* ================= STICKY ================= */

.sticky-buttons{
 position:fixed;
 right:20px;
 bottom:20px;
 display:flex;
 flex-direction:column;
 gap:10px;
}

.sticky-buttons a{
 width:50px;
 height:50px;
 background:var(--gold);
 border-radius:50%;
 display:flex;
 align-items:center;
 justify-content:center;
 color:white;
 text-decoration:none;
 font-size:20px;
}


/* ================= RESPONSIVE ================= */

@media(max-width:1000px){
 .products{
   grid-template-columns:repeat(2,1fr);
 }
}

@media(max-width:600px){
 .products{
   grid-template-columns:1fr;
 }
}

</style>
</head>

<body>



<!-- ================= HEADER ================= -->

<header>
 <div class="nav-inner">

   <a href="index.html">
     <img src="header-logo.png" class="header-logo">
   </a>

   <div class="menu">

     <div class="menu-item">KATEGORİ
       <div class="dropdown">
         <div>Akıllı Saat</div>
         <div>Kulaklık</div>
         <div>Powerbank</div>
         <div>Tablet</div>
         <div>Aksesuar</div>
         <div>Hoparlör</div>
         <div>Kamera</div>
         <div>Şarj Cihazı</div>
       </div>
     </div>

     <div class="menu-item">NEW</div>
     <div class="menu-item">Hakkımızda</div>

   </div>

   <input class="search" placeholder="Ürün ara..."/>

 </div>
</header>



<!-- ================= HERO ================= -->

<section class="hero">

 <div class="slide active">
   <img src="https://picsum.photos/1600/900?1">
 </div>

 <div class="slide">
   <img src="https://picsum.photos/1600/900?2">
 </div>

 <div class="slide">
   <img src="https://picsum.photos/1600/900?3">
 </div>

</section>



<!-- ================= PRODUCTS ================= -->

<section class="products">

 <a href="product.html" class="card">
   <div class="badge">NEW</div>
   <img src="https://picsum.photos/400/400?4">
   <h3>Akıllı Saat Pro</h3>
   <span>₺2.499</span>
 </a>

 <a href="product.html" class="card">
   <div class="badge">NEW</div>
   <img src="https://picsum.photos/400/400?5">
   <h3>Kablosuz Kulaklık</h3>
   <span>₺1.199</span>
 </a>

 <a href="product.html" class="card">
   <img src="https://picsum.photos/400/400?6">
   <h3>Powerbank 20.000mAh</h3>
   <span>₺699</span>
 </a>

 <a href="product.html" class="card">
   <img src="https://picsum.photos/400/400?7">
   <h3>Bluetooth Hoparlör</h3>
   <span>₺899</span>
 </a>

</section>



<!-- ================= STICKY ================= -->

<div class="sticky-buttons">
 <a href="#">↑</a>
 <a href="#">☎</a>
</div>



<script>

const slides = document.querySelectorAll('.slide');
let i = 0;

setInterval(()=>{
 slides[i].classList.remove('active');
 i = (i+1) % slides.length;
 slides[i].classList.add('active');
},4000);

</script>



</body>
</html>
