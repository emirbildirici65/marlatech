<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MARLA TECH</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--gold:#c7a14a;
--soft:#f6f6f6;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{background:#fff;color:#111}

/* ================= HEADER ================= */
header{
position:fixed;
top:0;
width:100%;
background:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:16px 70px;
box-shadow:0 2px 14px rgba(0,0,0,.05);
z-index:999;
}

.logo img{
height:46px;
cursor:pointer;
}

nav{
display:flex;
gap:30px;
align-items:center;
}

/* search */
.search{
padding:9px 16px;
border-radius:30px;
border:1px solid #ddd;
outline:none;
transition:.3s;
}
.search:focus{
border-color:var(--gold);
box-shadow:0 0 0 3px rgba(199,161,74,.15);
}

/* dropdown FIXED */
.dropdown{
position:relative;
padding-bottom:14px;
}

.dropdown-menu{
position:absolute;
top:100%;
left:0;
background:#fff;
border-radius:14px;
box-shadow:0 14px 40px rgba(0,0,0,.12);
min-width:220px;
padding:10px;
display:none;
}

/* hover safe zone */
.dropdown:hover .dropdown-menu{
display:block;
}

.dropdown-menu div{
padding:9px 12px;
border-radius:8px;
cursor:pointer;
transition:.2s;
}
.dropdown-menu div:hover{
background:var(--soft);
color:var(--gold);
}

/* ================= HERO ================= */
.hero{
margin-top:90px;
height:520px;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;height:100%;
background-size:cover;
background-position:center;
opacity:0;
transition:1s;
}
.slide.active{opacity:1}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(255,255,255,.7);
width:28px;height:28px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:13px;
}
.left{left:12px}
.right{right:12px}

/* ================= PRODUCTS ================= */
.section-title{
text-align:center;
font-size:28px;
font-weight:700;
margin:70px 0 25px;
}

.products{
padding:20px 70px 80px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.card{
background:#fff;
border-radius:16px;
padding:20px;
box-shadow:0 8px 26px rgba(0,0,0,.06);
cursor:pointer;
transition:.35s;
position:relative;
overflow:hidden;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 0 2px var(--gold);
}

.card img{
width:100%;
height:200px;
object-fit:contain;
transition:.4s;
}
.card:hover img{
transform:scale(1.1);
}

.badge{
position:absolute;
top:10px;
left:10px;
background:var(--gold);
color:#fff;
font-size:11px;
padding:5px 10px;
border-radius:20px;
font-weight:600;
}

/* ================= CONTACT UPGRADED ================= */
.contact{
background:#fafafa;
padding:90px 70px;
}

.contact-box{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:50px;
}

.contact-card{
background:#fff;
padding:40px;
border-radius:18px;
box-shadow:0 10px 40px rgba(0,0,0,.07);
}

.contact input,
.contact textarea{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:10px;
border:1px solid #ddd;
outline:none;
transition:.3s;
}

.contact input:focus,
.contact textarea:focus{
border-color:var(--gold);
box-shadow:0 0 0 3px rgba(199,161,74,.15);
}

.contact button{
background:var(--gold);
color:#fff;
border:none;
padding:12px;
border-radius:10px;
font-weight:600;
cursor:pointer;
transition:.3s;
}
.contact button:hover{
transform:translateY(-2px);
}

/* ================= ABOUT ================= */
.about{
padding:100px 20px;
text-align:center;
}
.about img{
height:280px;
margin:35px 0;
}

/* footer */
footer{
background:#111;
color:#fff;
text-align:center;
padding:30px;
}
</style>
</head>

<body>

<header>
<a href="index.html" class="logo">
<img src="header-logo.png">
</a>

<nav>
<div class="dropdown">
<b>KATEGORİ</b>
<div class="dropdown-menu" id="dropdown"></div>
</div>

<a onclick="showNew()">NEW</a>

<input id="search" class="search" placeholder="Ürün ara">

<a href="#about">Hakkımızda</a>
</nav>
</header>


<section class="hero">
<div class="slide active" style="background-image:url('https://picsum.photos/1600/900?1')"></div>
<div class="slide" style="background-image:url('https://picsum.photos/1600/900?2')"></div>

<div class="arrow left" onclick="prev()">‹</div>
<div class="arrow right" onclick="next()">›</div>
</section>


<h2 class="section-title">ÜRÜNLER</h2>
<section id="products" class="products"></section>


<section class="contact">
<div class="contact-box">

<div class="contact-card">
<h2>İletişim</h2>
<p>📍 İstanbul / Türkiye</p>
<p>📞 +90 5XX XXX XX XX</p>
<p>✉ info@marlatech.com</p>
</div>

<div class="contact-card">
<form>
<input placeholder="Ad Soyad">
<input placeholder="Email">
<textarea rows="5" placeholder="Mesaj"></textarea>
<button>Gönder</button>
</form>
</div>

</div>
</section>


<section id="about" class="about">
<h2>Hakkımızda</h2>
<img src="logo.png">
<p>MARLA TECH global elektronik ithalat ve toptan satış çözümleri sunar.</p>
</section>


<footer>© 2026 MARLA TECH</footer>


<script>
let slides=document.querySelectorAll('.slide');
let i=0;
function show(n){
slides[i].classList.remove('active');
i=(n+slides.length)%slides.length;
slides[i].classList.add('active');
}
function next(){show(i+1)}
function prev(){show(i-1)}
setInterval(next,4000);

/* products */
let products=[];
fetch('product.json')
.then(r=>r.json())
.then(d=>{
products=d;

const grid=document.getElementById('products');
const drop=document.getElementById('dropdown');

[...new Set(products.map(x=>x.cat))].forEach(cat=>{
drop.innerHTML+=`<div onclick="filter('${cat}')">${cat}</div>`;
});

render(products);
});

function render(list){
const grid=document.getElementById('products');
grid.innerHTML="";
list.forEach((p,i)=>{
grid.innerHTML+=`
<div class="card" onclick="location='product.html?id=${p.id}'">
${i<2?'<div class="badge">NEW</div>':''}
<img src="${p.images[0]}">
<h4>${p.name}</h4>
</div>`;
});
}

function filter(c){
render(products.filter(x=>x.cat===c));
}

search.oninput=e=>{
render(products.filter(x=>x.name.toLowerCase().includes(e.target.value.toLowerCase())));
}

function showNew(){
render(products.slice(-2));
}
</script>

</body>
</html>
